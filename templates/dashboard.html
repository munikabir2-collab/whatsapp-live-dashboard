<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>WhatsApp Live Dashboard</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#0b141a;
            color:white;
        }

        .header{
            background:#202c33;
            padding:15px;
            font-size:22px;
            font-weight:bold;
        }

        .container{
            display:flex;
            height:calc(100vh - 120px);
        }

        .chat-box{
            flex:2;
            overflow-y:auto;
            padding:20px;
            background:#111b21;
        }

        .right-panel{
            flex:1;
            background:#0f1a20;
            border-left:1px solid #333;
            padding:10px;
        }

        .message{
            padding:10px;
            margin:10px 0;
            border-radius:10px;
            max-width:70%;
            word-wrap:break-word;
        }

        .sent{
            background:#005c4b;
            margin-left:auto;
        }

        .received{
            background:#202c33;
        }

        .status{
            font-size:12px;
            color:#ccc;
            margin-top:5px;
        }

        .input-area{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            display:flex;
            background:#202c33;
            padding:10px;
            box-sizing:border-box;
        }

        .input-area input{
            flex:1;
            padding:10px;
            border:none;
            border-radius:8px;
        }

        .input-area button{
            margin-left:10px;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#00a884;
            color:white;
            cursor:pointer;
        }

        #messengerBox div{
            background:#ffdd57;
            color:black;
            padding:8px;
            margin:5px 0;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="header">
    📡 WhatsApp Live Dashboard
</div>

<div class="container">

    <div id="messages" class="chat-box">

        {% for msg in messages %}

        <div class="message {% if msg.sender == 'user' %}sent{% else %}received{% endif %}">

            <div>{{ msg.text }}</div>

            <div
                class="status"
                id="status-{{ msg.id }}"
            >
                {{ msg.status }}
            </div>

        </div>

        {% endfor %}

    </div>

    <div class="right-panel">

        <h3>💬 Messenger Inbox</h3>

        <div
            id="messengerBox"
            style="height:80%;overflow-y:auto;"
        ></div>

    </div>

</div>

<div class="input-area">

    <input
        id="messageInput"
        type="text"
        placeholder="Type a message..."
    >

    <button onclick="sendMessage()">
        Send
    </button>

</div>

<script>

const protocol =
    location.protocol === "https:"
        ? "wss"
        : "ws";

const ws =
    new WebSocket(
        `${protocol}://${location.host}/ws`
    );

const messagesDiv =
    document.getElementById("messages");


// ============================
// WebSocket Events
// ============================

ws.onopen = () => {

    console.log("✅ WS Connected");

};

ws.onclose = () => {

    console.log("❌ WS Closed");

};

ws.onerror = (e) => {

    console.log("WS Error", e);

};

ws.onmessage = (event) => {

    const data =
        JSON.parse(event.data);

    console.log(data);

    // Sent message
    if(data.type === "new_message"){

        addMessage(
            data.text,
            data.status,
            "sent",
            data.id
        );
    }

    // Incoming whatsapp
    if(data.type === "incoming_message"){

        addMessage(
            data.text,
            data.status,
            "received",
            data.id
        );
    }

    // Status update
    if(data.type === "status_update"){

        const el =
            document.getElementById(
                "status-" + data.id
            );

        if(el){

            el.innerText =
                data.status;
        }
    }

    // Messenger
    if(data.type === "messenger_message"){

        const box =
            document.getElementById(
                "messengerBox"
            );

        const div =
            document.createElement("div");

        div.innerText =
            "💬 " + data.text;

        box.appendChild(div);

        box.scrollTop =
            box.scrollHeight;
    }

};


// ============================
// Send Message
// ============================

async function sendMessage(){

    const input =
        document.getElementById(
            "messageInput"
        );

    const text =
        input.value.trim();

    if(!text) return;

    const formData =
        new FormData();

    formData.append(
        "text",
        text
    );

    const response =
        await fetch(
            "/send",
            {
                method:"POST",
                body:formData
            }
        );

    console.log(
        await response.json()
    );

    input.value = "";
}


// ============================
// Add Message
// ============================

function addMessage(
    text,
    status,
    type,
    id
){

    const div =
        document.createElement("div");

    div.className =
        "message " + type;

    div.innerHTML = `
        <div>${text}</div>
        <div
            class="status"
            id="status-${id}"
        >
            ${status}
        </div>
    `;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
        messagesDiv.scrollHeight;
}


// Auto Scroll on Load
messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

</script>

</body>
</html>
